<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZION: Solar System Command Center</title>
    <!-- Importing Globe.gl -->
    <script src="https://unpkg.com/globe.gl"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <!-- The 3D UI Container -->
    <div id="ui-layer">

        <!-- Header Section -->
        <header class="glass-panel">
            <div class="header-left">
                <h1>ZION CMD CTR // ORION</h1>
                <div class="status-indicator">
                    <span class="pulsing-dot"></span>
                    <span>SYSTEM ONLINE</span>
                </div>
            </div>

            <div id="planet-menu" class="planet-toggle hidden-scrollbar">
                <!-- Auto generated by JS -->
            </div>

            <div class="view-toggles">
                <button id="btn-single-view" class="active">SINGLE VIEW</button>
                <button id="btn-compare-view" class="btn-compare">COMPARE SIMS</button>
            </div>
        </header>

        <!-- Left Sidebar: Health & Resources -->
        <aside class="left-panel glass-panel hidden-scrollbar">
            <h2>COLONY HEALTH</h2>
            <div id="colony-list" class="data-list">
                <div class="loading-data">Awaiting telemetry...</div>
            </div>

            <h2 style="margin-top: 2rem;">RESOURCE STOCKS</h2>
            <div id="resource-list" class="data-list">
                <!-- Auto populated via SSE -->
            </div>

            <!-- Future Federation Leaderboard -->
            <h2 style="margin-top: 2rem;">FEDERATION RANKING</h2>
            <div id="federation-list" class="data-list">
                <div class="station-card">
                    <div class="card-header">
                        <span>LOCAL FORK (Orion)</span>
                        <span class="status-green">ACTIVE</span>
                    </div>
                    <div style="font-size: 0.8em; color: var(--text-dim);">
                        Fleet Avg GPA: <span id="local-gpa-avg" style="color: white">Calc...</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Right Sidebar: Live Logs -->
        <aside class="right-panel glass-panel hidden-scrollbar">
            <h2>LIVE BOT SWARM FEED</h2>
            <div id="live-feed" class="data-list feed-list">
                <!-- Auto populated via SSE -->
            </div>
        </aside>

    </div>

    <!-- The 3D Globes render here -->
    <div id="globe-container">
        <!-- Single Mode -->
        <div id="globeVizSingle" class="globe-wrapper single-active"></div>

        <!-- Compare Mode (Earth, Moon, Mars) -->
        <div id="compareVizContainer" class="compare-wrapper hidden">
            <div class="compare-pane">
                <div class="pane-label">EARTH SIM</div>
                <div id="globeVizEarth" class="globe-canvas"></div>
            </div>
            <div class="compare-pane">
                <div class="pane-label">MOON SIM</div>
                <div id="globeVizMoon" class="globe-canvas"></div>
            </div>
            <div class="compare-pane">
                <div class="pane-label">MARS SIM</div>
                <div id="globeVizMars" class="globe-canvas"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>

</html>
