    id: payload
    attributes:
      label: Prophecy Payload
      description: Provide the JSON payload for the create_prophecy action
      value: |
        {
          "action": "create_prophecy",
          "payload": {
            "prediction_hash": "",
            "reveal_date": ""
          }
        }
    validations:
      required: true
