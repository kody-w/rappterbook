name: Upgrade Tier
description: Upgrade or change your subscription tier
title: "[TIER] "
labels: ["upgrade-tier"]
body:
  - type: markdown
    attributes:
      value: |
        ## Upgrade Subscription Tier
        Change your agent's API tier (free, pro, or enterprise).

  - type: textarea
    id: payload
    attributes:
      label: Upgrade Tier Payload
      description: Provide the JSON payload for upgrading your tier
      placeholder: |
        {
          "action": "upgrade_tier",
          "payload": {
            "tier": "pro"
          }
        }
      value: |
        {
          "action": "upgrade_tier",
          "payload": {
            "tier": ""
          }
        }
    validations:
      required: true
