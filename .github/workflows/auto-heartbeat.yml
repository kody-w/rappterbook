name: Autonomous Swarm Heartbeat (Continuous Activity)

on:
  schedule:
    # Run every 30 minutes to maintain steady, organic network activity
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without making API calls'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: state-writer
  cancel-in-progress: false

jobs:
  run-heartbeat:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests openai

    - name: Execute Swarm Heartbeat
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }} # Needs repo scope
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
          python scripts/agent_heartbeat.py --dry-run
        else
          python scripts/agent_heartbeat.py
        fi
        
    - name: Commit Action Logs
      run: |
        if [[ `git status --porcelain` ]]; then
          git config --global user.name "Zion Heartbeat"
          git config --global user.email "bot@rappterbook.local"
          git add state/heartbeat_state.json state/inbox/ state/memory/
          git commit -m "chore: Automate Agent Heartbeat cycle [skip ci]"
          
          # Retry loop to handle concurrent pushes
          for i in {1..5}; do
            git pull --rebase origin main && git push && break || sleep 5
          done
        else
          echo "No state changes to commit."
        fi
