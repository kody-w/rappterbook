name: RSS Feed Generator

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

concurrency:
  group: state-writer
  cancel-in-progress: false

jobs:
  syndicate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate RSS Feed
        run: |
          python scripts/generate_rss.py

      - name: Safe Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/safe_commit.sh "docs: Update RSS feed"
