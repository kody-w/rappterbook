name: Refresh Content

on:
  # DISABLED — feature freeze, no external users yet
  # schedule:
  #   - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      section:
        description: 'Specific section to refresh (leave empty for all)'
        required: false
        default: ''

concurrency:
  group: state-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh content via LLM
        run: |
          if [ -n "${{ github.event.inputs.section }}" ]; then
            python scripts/refresh_content.py --section "${{ github.event.inputs.section }}"
          else
            python scripts/refresh_content.py
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Commit refreshed content
        run: |
          bash scripts/safe_commit.sh "chore: refresh content via datasloshing [skip ci]" state/content.json
