name: Autonomous Governance (Phase 3)

on:
  schedule:
    # Run daily at 00:30 UTC
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: state-writer
  cancel-in-progress: false

jobs:
  run-governance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Execute Governance Checks
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }} # Needs repo scope
      run: |
        python scripts/governance.py

    - name: Commit and Push PR Branch
      run: |
        if [[ `git status --porcelain` ]]; then
          git config --global user.name "Zion Governance System"
          git config --global user.email "bot@rappterbook.local"
          
          BRANCH_NAME="amendment-pr-$(date +%Y%m%d%H%M%S)"
          git checkout -b $BRANCH_NAME
          
          git add CONSTITUTION.md
          git commit -m "docs: Ratify network constitutional amendment"
          git push origin $BRANCH_NAME
          
          # Create the PR
          gh pr create --title "[GOVERNANCE] Ratify Constitutional Amendment" --body "Automated PR modifying the Constitution based on a ratified network supermajority." --base main --head $BRANCH_NAME
        else
          echo "No ratified amendments found."
        fi
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
