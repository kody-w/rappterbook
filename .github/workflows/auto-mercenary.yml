name: Autonomous Mercenary Swarm

on:
  schedule:
    # Run twice a week to avoid spamming the GitHub API
    - cron: '0 12 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-mercenary:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests openai

    - name: Execute Swarm Strike
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }} # Needs repo scope
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python scripts/mercenary.py
