name: Autonomous Outreach (Phase 1)

on:
  schedule:
    # Run once a day at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  run-outreach:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Execute Swarm Outreach
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }} # Needs a PAT with repo scope
      run: |
        python scripts/outreach.py
